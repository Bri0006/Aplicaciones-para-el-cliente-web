<html>
<body>
<script type="text/javascript">
    var countdown = prompt("Introduce un numero para iniciar la cuenta atrás:");
        while (countdown>0) {
            alert(countdown+ "...") ;
            countdown--;
        }
</script>
<script type="text/javascript">
    var countdown = prompt("Introduce un numero para iniciar la cuenta adelante:");
        while (countdown>0) {
            alert(countdown+ "...") ;
            countdown++;
        }
</script>
</body>
</html>
