<html>
<head>
    <meta charset="UTF-8">
    <title>Operador Condicional Ternario</title>
</head>
<body>
    <script type="text/javascript">
        var dividendo = parseFloat(prompt("Introduce el dividendo:"));
        var divisor = parseFloat(prompt("Introduce el divisor:"));
        var resultado;

        divisor != 0 ? resultado = dividendo / divisor: 
        alert("No es posible la división por cero") ;
        alert("El resultado es: " + resultado);
    </script>

</body>
</html>
