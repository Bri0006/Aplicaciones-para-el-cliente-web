<html>
<head>
    <meta charset="UTF-8">
    <title>Formularios HTML</title>
</head>
<body>
    <form action="" method="get">
        <p>
            Nombre: <input type="text" name="name_control" autofocus 
            required />
        </p>
        <p>
            Correo electrónico: <input type="email" name="email_control" 
            required />
        </p>
        <p>
            URL: <input type="url" name="url_control" 
            placeholder="Escribe la URL de tu página web personal" />
        </p>  
        <p>
            <input type="checkbox" name="condiciones" /> Declaro haber 
            leido y aceptar las condiciones generales del programa y la 
            normativa sobre protección de datos
        </p>
        <p>
            <input type="submit" value="Enviar" />
        </p>
    </form>
</body>
</html>
