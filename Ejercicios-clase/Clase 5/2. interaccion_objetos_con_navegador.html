<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Interacción con el Navegador</title>
</head>
<body>

    <script type="text/javascript">
        
        // 1. OBJETO NAVIGATOR (Datos del navegador)
        document.write("<strong>Navegador:</strong> " + navigator.appName + "<br>");
        document.write("<strong>Versión:</strong> " + navigator.appVersion + "<br><br>");

        // 2. OBJETO SCREEN (Datos de la pantalla del usuario)
        // Nota: En la imagen se repite navigator, aquí lo corregimos para usar screen
        document.write("<strong>Ancho de pantalla:</strong> " + screen.width + "px<br>");
        document.write("<strong>Alto de pantalla:</strong> " + screen.height + "px<br><br>");

        // 3. OBJETO LOCATION (Datos de la URL)
        document.write("<strong>URL completa:</strong> " + location.href + "<br><br>");

        // 4. OBJETO WINDOW (Control de ventana)
        // Nota: Estos comandos suelen bloquearse por el navegador si no hay interacción
        function imprimirPagina() {
            window.print();
        }
    </script>

    <p>Control de Historial:</p>
    <input type="button" value="Ir Atrás" onClick="history.back();">
    
    <p>Acciones de Ventana:</p>
    <button onclick="imprimirPagina()">Imprimir esta página</button>

</body>
</html>
