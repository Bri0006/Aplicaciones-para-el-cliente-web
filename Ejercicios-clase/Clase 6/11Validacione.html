<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Validaciones Individuales</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #fce4ec; /* Tono pastel suave */
            color: #333;
            padding: 30px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #880e4f;
            font-size: 1.8em;
            margin-bottom: 30px;
        }
        /* Tarjetas independientes para cada ejercicio */
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            margin-bottom: 20px;
            border-left: 5px solid #d81b60;
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.2em;
            color: #ad1457;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group {
            margin: 15px 0;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        label {
            font-weight: bold;
            font-size: 0.9em;
        }
        input[type="text"] {
            padding: 8px 12px;
            border: 1px solid #f48fb1;
            border-radius: 6px;
            outline: none;
            box-sizing: border-box;
        }
        .input-short { width: 70px; text-align: center; }
        .input-full { flex: 1; min-width: 200px; }
        
        button {
            background-color: #d81b60;
            color: white;
            border: none;
            padding: 9px 16px;
            font-size: 0.9em;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #ad1457;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
    </style>

    <script type="text/javascript">

        // =========================================================================
        // 1. DIAPOSITIVA: VALIDACIÓN Y ENVÍO (Campo Vacío)
        // =========================================================================
        function validacion() {
            // Captura el valor del input por su ID
            var valor = document.getElementById("campo").value;
            
            // Evalúa si es nulo o si la longitud de caracteres es igual a 0
            if (valor == null || valor.length == 0) {
                alert("El campo no puede ser vacío");
                return false;
            }
            
            alert("¡Éxito! El campo contiene: " + valor);
            return true;
        }

        // =========================================================================
        // 2. DIAPOSITIVA: VALIDACIÓN CAMPO DE TEXTO (Solo Números / Teléfono)
        // =========================================================================
        function validaNum() {
            var valor = document.getElementById("telefono").value;
            
            // isNaN() devuelve true si el valor NO es un número válido
            if (isNaN(valor) || valor.trim() === "") {
                alert("El campo tiene que ser numérico");
                return false;
            }
            
            alert("¡Éxito! El número ingresado es válido.");
            return true;
        }

        // =========================================================================
        // 3. DIAPOSITIVA: VALIDACIÓN DE FECHA
        // =========================================================================
        function validaFecha() {
            var dia = document.getElementById("dia").value;
            var mes = document.getElementById("mes").value;
            var ano = document.getElementById("ano").value;
            
            // Nota: En JS los meses van de 0 a 11 (Enero es 0), por eso restamos 1 al mes
            var fecha = new Date(ano, mes - 1, dia);
            
            // Corrección lógica: Validamos que los campos tengan datos y que la fecha sea real.
            // Si el objeto Date no se puede procesar, getTime() devuelve NaN.
            if (isNaN(fecha.getTime()) || dia === "" || mes === "" || ano === "") {
                alert("La fecha introducida no es válida");
                return false;
            }
            
            alert("¡Éxito! Fecha procesada correctamente: " + fecha.toLocaleDateString());
            return true;
        }

        // =========================================================================
        // 4. DIAPOSITIVA: VALIDAR CHECKBOX (Términos / Condiciones)
        // =========================================================================
        function validaCheck() {
            // Obtenemos el elemento completo del checkbox
            var elemento = document.getElementById("campoCondiciones");
            
            // Si la propiedad '.checked' es falsa, significa que no está marcado
            if (!elemento.checked) {
                alert("Debe aceptar las condiciones para continuar");
                return false;
            }
            
            alert("¡Éxito! Has aceptado las condiciones.");
            return true;
        }

        // =========================================================================
        // 5. DIAPOSITIVA: EXPRESIONES REGULARES (Validar Email)
        // =========================================================================
        function validaEmail() {
            var valor = document.getElementById("campoEmail").value;
            
            // Patrón Regex de la diapositiva para validar la estructura del correo electrónico
            var patronRegex = /^\w+([.-]?\w+)*@\w+([.-]?\w+)*(\.\w{2,3})+$/;
            
            // .test() evalúa si el string cumple con los requisitos del patrón
            if (!patronRegex.test(valor)) {
                alert("El correo electrónico no tiene un formato válido");
                return false;
            }
            
            alert("¡Éxito! El correo tiene una estructura correcta.");
            return true;
        }

    </script>
</head>
<body>

    <div class="container">
        <h1>Laboratorio de Validaciones Individuales</h1>

        <div class="card">
            <h2>1. Validación General (Vacío)</h2>
            <div class="input-group">
                <label for="campo">Texto Obligatorio:</label>
                <input type="text" id="campo" class="input-full" placeholder="No me dejes en blanco...">
                <button onclick="validacion()">Validar</button>
            </div>
        </div>

        <div class="card">
            <h2>2. Validación de Campo Numérico</h2>
            <div class="input-group">
                <label for="telefono">Teléfono / Edad:</label>
                <input type="text" id="telefono" class="input-full" placeholder="Escribe solo números...">
                <button onclick="validaNum()">Validar</button>
            </div>
        </div>

        <div class="card">
            <h2>3. Validación de Fecha</h2>
            <div class="input-group">
                <input type="text" id="dia" class="input-short" placeholder="DD" maxlength="2">
                <span>/</span>
                <input type="text" id="mes" class="input-short" placeholder="MM" maxlength="2">
                <span>/</span>
                <input type="text" id="ano" class="input-short" placeholder="AAAA" maxlength="4">
                <button onclick="validaFecha()" style="margin-left: auto;">Validar Fecha</button>
            </div>
        </div>

        <div class="card">
            <h2>4. Validar Casilla de Verificación</h2>
            <div class="input-group">
                <label class="checkbox-container">
                    <input type="checkbox" id="campoCondiciones">
                    Acepto los términos y condiciones del servicio
                </label>
                <button onclick="validaCheck()" style="margin-left: auto;">Validar Check</button>
            </div>
        </div>

        <div class="card">
            <h2>5. Validación de Correo (RegEx)</h2>
            <div class="input-group">
                <label for="campoEmail">Email:</label>
                <input type="text" id="campoEmail" class="input-full" placeholder="ejemplo@correo.com">
                <button onclick="validaEmail()">Validar Email</button>
            </div>
        </div>

    </div>

</body>
</html>
