<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificación de Apariencia y Comportamiento</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            padding: 40px;
            color: #333;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 500px;
            margin: 0 auto;
        }
        h2 {
            color: #1a237e;
            margin-top: 0;
            font-size: 1.4em;
        }
        .form-group {
            margin-bottom: 20px;
            padding: 10px;
            background-color: #f9fbe7; /* Tono suave para resaltar controles */
            border-radius: 6px;
            border-left: 4px solid #c0ca33;
        }
        .checkbox-label {
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }
        .btn-submit {
            background-color: #1a237e;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            width: 100%;
        }
        .btn-submit:hover {
            background-color: #0d1b60;
        }
    </style>

    <script>
        // === CÓDIGO DE LA DIAPOSITIVA 2: ACCESO AL DOM ===
        document.addEventListener("DOMContentLoaded", function() {
            // Evaluamos en la consola del navegador de forma limpia
            if (document.nodeType === Node.DOCUMENT_NODE) {
                console.log("DOM verificado: 'document' es DOCUMENT_NODE.");
            }
            if (document.documentElement.nodeType === Node.ELEMENT_NODE) {
                console.log("DOM verificado: 'documentElement' (html) es ELEMENT_NODE.");
            }
        });

        // === CÓDIGO DE LA DIAPOSITIVA 3: COMPORTAMIENTO DINÁMICO ===
        // CORRECCIÓN: Se unificó el uso del parámetro 'form' para evitar errores de referencia
        function enviar(form) {
            // Validamos si el elemento con id/name "alta" está seleccionado
            if (form.alta.checked === true) {
                form.action = "paginas/alta.html";
                alert("Simulación: Redirigiendo destino a -> paginas/alta.html");
            } 
            else if (form.alta.checked === false) {
                form.action = "paginas/baja.html";
                alert("Simulación: Redirigiendo destino a -> paginas/baja.html");
            }
            
            // Envía el formulario programáticamente
            form.submit();
        }
    </script>
</head>
<body>

    <div class="container">
        <h2>Modificar Comportamiento de Formulario</h2>
        
        <form name="formulario_ejemplo" method="post" onsubmit="event.preventDefault(); enviar(this);">
            
            <div class="form-group">
                <input type="checkbox" id="alta" name="alta">
                <label for="alta" class="checkbox-label">¿Dar de alta en el sistema?</label>
            </div>

            <button type="submit" class="btn-submit">Procesar Solicitud</button>
            
        </form>
    </div>

</body>
</html>
