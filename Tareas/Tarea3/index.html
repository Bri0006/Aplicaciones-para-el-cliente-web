<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registro de Clientes</title>
        <link rel="stylesheet" href="style.css">
    </head>
<body>
    <div class="form-container">
        <h2>Ingreso de Datos de Clientes</h2>
        <form action="#" method="post">
            <div class="input-group">
                <label for="cedula">Cédula:</label>
                <input type="text" id="cedula" name="cedula" placeholder="Ej:131XXXXXXX" required>
    </div>
    <div class="input-group">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="NombreCompleto" required>
    </div>
    <div class="input-group">
        <label for="direccion">Dirección:</label>
        <input type="text" id="direccion" name="direccion" placeholder="Calle y Av." required>
    </div>
    <div class="input-group">
        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" placeholder="09XXXXXXXX" required>
    </div>
    <div class="input-group">
        <label for="correo">Correo Electrónico:</label>
        <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
    </div>
    <button type="submit" class="btn-submit">Registrar Cliente</button>
    </form>
</div>
</body>
</html>
