<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Registro - ULEAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=400;500;600;700&display=swap" rel="stylesheet">
    

    <style>
        :root {
            --azul-sidebar: #004a99;
            --azul-hover: #003670;
            --gris-fondo: #f8fafc;
            --blanco: #ffffff;
            --texto-oscuro: #1e293b;
            --texto-mutado: #64748b;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--gris-fondo);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--texto-oscuro);
            padding: 2rem 0;
        }
        .register-container {
            background: var(--blanco);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px;
        }
        h2 {
            color: var(--azul-sidebar);
            margin-top: 0;
            font-weight: 700;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: var(--texto-mutado);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--azul-sidebar);
            box-shadow: 0 0 0 3px rgba(0, 74, 153, 0.1);
        }
        .btn-submit {
            width: 100%;
            background-color: var(--azul-sidebar);
            color: var(--blanco);
            padding: 0.85rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }
        .btn-submit:hover {
            background-color: var(--azul-hover);
        }
        .btn-submit:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }
        .message {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .message.error {
            background-color: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
        }
        .message.success {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .login-redirect {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--texto-mutado);
        }
        .login-redirect a {
            color: var(--azul-sidebar);
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div id="app" class="register-container">
    <h2>Solicitud de Acceso</h2>
    <p class="subtitle">Envía tus datos para verificar tu registro en el sistema de graduados.</p>

    <div v-if="msgTexto" :class="['message', msgClase]">
        {{ msgTexto }}
    </div>

    <form @submit.prevent="enviarSolicitud">
        
        <div class="form-row">
            <div class="form-group">
                <label>Número de Cédula</label>
                <input type="text" v-model="form.cedula" @input="form.cedula = form.cedula.replace(/[^0-9]/g, ''); verificarCedulaEnTiempoReal();" @blur="verificarCedulaEnTiempoReal"maxlength="10" placeholder="Ej. 131XXXXXXX" required>
    <!-- Alerta en tiempo real debajo de la cédula -->
    <span v-if="cedulaError" style="color: #b91c1c; font-size: 0.8rem; font-weight: 500; display: block; margin-top: 0.25rem;">
        {{ cedulaError }}
    </span>
</div>
            <div class="form-group">
                <label>Fecha de Nacimiento</label>
                <!-- Evita seleccionar fechas futuras asignando el :max dinámico -->
                <input type="date" v-model="form.fecha_nacimiento" :max="maxFecha" required>
            </div>
        </div>

        <div class="form-group">
            <label>Nombres Completos</label>
            <input type="text" v-model="form.nombres" @input="form.nombres = form.nombres.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ ]/g, '')" placeholder="Ej. Juan Andrés" required>
        </div>

        <div class="form-group">
            <label>Apellidos Completos</label>
            <input type="text" v-model="form.apellidos" @input="form.apellidos = form.apellidos.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ ]/g, '')" placeholder="Ej. Pérez Vélez" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Correo de Contacto (Personal)</label>
                <input type="email" v-model="form.correo" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="form-group">
                <label>Número de Celular</label>
                <!-- Limita el tamaño a 10 dígitos y bloquea caracteres -->
                <input type="text" v-model="form.celular" @input="form.celular = form.celular.replace(/[^0-9]/g, '')" maxlength="10" placeholder="Ej. 09XXXXXXXX" required>
            </div>
        </div>

        <div class="form-group">
            <label>Carrera de la que se Graduó</label>
            <select v-model="form.carrera" required>
                <option value="" disabled>Seleccione su carrera...</option>
                <option v-for="carrera in listaCarreras" :key="carrera.id" :value="carrera.nombre">
                    {{ carrera.nombre }}
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Año de Graduación</label>
            <input type="text" v-model="form.anio_graduacion" @input="form.anio_graduacion = form.anio_graduacion.replace(/[^0-9]/g, '')" maxlength="4" placeholder="Ej. 2024" required>
        </div>

        <button type="submit" class="btn-submit" :disabled="procesando">
            {{ procesando ? 'Enviando Solicitud...' : 'Enviar Solicitud' }}
        </button>
    </form>

    <div class="login-redirect">
        ¿Ya tienes acceso aprobado? <a href="login.html">Inicia sesión aquí</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script type="module" src="registro.js"></script>
</body>
</html>
