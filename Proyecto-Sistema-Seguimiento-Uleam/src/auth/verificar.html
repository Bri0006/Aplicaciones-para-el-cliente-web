<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código - Seguimiento Graduados ULEAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        :root {
            --azul-institucional: #004a99;
            --rojo-alerta: #dc2626;
            --blanco: #ffffff;
            --gris-fondo: #f4f7fa;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--gris-fondo);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .verify-card {
            background: var(--blanco);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h2 {
            color: #1e293b;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 0.5rem;
            text-align: center;
            font-size: 1.4rem;
        }
        p {
            color: #64748b;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #475569;
            font-size: 0.9rem;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-align: center;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: var(--azul-institucional);
            box-shadow: 0 0 0 3px rgba(0, 74, 153, 0.1);
        }
        .btn {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }
        .btn-success {
            background-color: #059669;
            color: var(--blanco);
        }
        .btn-success:hover {
            background-color: #047857;
        }
        .btn-success:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }
        .error-msg {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--rojo-alerta);
            background-color: #fef2f2;
            padding: 0.6rem;
            border-radius: 6px;
            border: 1px solid #fca5a5;
            text-align: center;
        }
        .info-msg {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #065f46;
            background-color: #ecfdf5;
            padding: 0.6rem;
            border-radius: 6px;
            border: 1px solid #a7f3d0;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="app" class="verify-card">
    <h2>Ingresa tu Clave de Acceso</h2>
    <p>Hemos registrado un código único válido por 15 minutos. Revísalo en la consola de desarrollo o en tu bandeja.</p>
    
    <form @submit.prevent="comprobarCodigo">
        <div class="form-group">
            <label for="token-input">Código de Verificación</label>
            <input 
                type="text" 
                v-model="token" 
                placeholder="000000" 
                maxlength="6" 
                required
            >
        </div>
        
        <button 
            type="submit" 
            class="btn btn-success" 
            :disabled="procesando || token.length !== 6"
        >
            {{ procesando ? 'VERIFICANDO...' : 'INGRESAR' }}
        </button>
    </form>

    <div v-if="msgError" class="error-msg">
        {{ msgError }}
    </div>

    <div v-if="msgExito" class="info-msg">
        {{ msgExito }}
    </div>
</div>

<script src="../config/supabaseClient.js"></script>
<script type="module" src="verificar.js"></script>
</body>
</html>
